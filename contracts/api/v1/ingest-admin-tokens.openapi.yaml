openapi: 3.1.0
info:
  title: Red Lycoris Ingest + Admin Integration Tokens API
  version: 1.0.0
  description: |
    Contract-first API for GitLab-only scan ingestion over CLI token auth and admin-managed integration tokens.
    Tenant boundaries are strict (org_id required, project_id optional) and deny-by-default for all endpoints.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: https://api.red-lycoris.example
security:
  - bearerAuth: []
tags:
  - name: ingest
  - name: admin-integration-tokens
paths:
  /api/v1/ingest/runs:init:
    post:
      tags: [ingest]
      summary: Initialize ingestion run and receive upload plan
      description: |
        GitLab-only entrypoint for scan ingestion. Requires idempotency key.
        Repeating the same `(token scope + tenant + X-Idempotency-Key + semantically identical payload)`
        returns the same run and upload plan.
      operationId: ingestRunInit
      security:
        - bearerAuth: [ingest:run:init, ingest:artifact:write]
      parameters:
        - $ref: '#/components/parameters/XIdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRunInitRequest'
      responses:
        '201':
          description: Run initialized
          headers:
            X-Idempotency-Replayed:
              description: True when request was served from idempotency cache
              schema:
                type: boolean
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestRunInitResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '409':
          description: Idempotency key re-used with a conflicting payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/Error413'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/ingest/runs/{run_id}:commit:
    post:
      tags: [ingest]
      summary: Commit ingestion run
      description: |
        Verifies artifact objects exist and sha256 hashes match. On success transitions run to COMMITTED
        and emits append-only event to event bus.
      operationId: ingestRunCommit
      security:
        - bearerAuth: [ingest:run:commit]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRunCommitRequest'
      responses:
        '200':
          description: Run committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestRunStatusResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          description: Run already committed or in invalid state for commit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/ingest/runs/{run_id}:
    get:
      tags: [ingest]
      summary: Get ingestion run status
      operationId: ingestRunGet
      security:
        - bearerAuth: [ingest:run:init, ingest:run:commit]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestRunStatusResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/admin/integration-tokens:
    get:
      tags: [admin-integration-tokens]
      summary: List integration tokens in current tenant boundary
      operationId: adminTokensList
      security:
        - bearerAuth: [admin:tokens:read]
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationTokenListResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
    post:
      tags: [admin-integration-tokens]
      summary: Issue integration token
      operationId: adminTokenCreate
      security:
        - bearerAuth: [admin:tokens:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminIntegrationTokenCreateRequest'
      responses:
        '201':
          description: Token issued (secret shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationTokenCreateResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/admin/integration-tokens/{id}:
    patch:
      tags: [admin-integration-tokens]
      summary: Update token mutable fields
      description: Only `name` and `expires_at` are mutable.
      operationId: adminTokenPatch
      security:
        - bearerAuth: [admin:tokens:write]
      parameters:
        - $ref: '#/components/parameters/TokenId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminIntegrationTokenPatchRequest'
      responses:
        '200':
          description: Token updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationToken'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/admin/integration-tokens/{id}/revoke:
    post:
      tags: [admin-integration-tokens]
      summary: Revoke integration token
      operationId: adminTokenRevoke
      security:
        - bearerAuth: [admin:tokens:write]
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationToken'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          description: Token already revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/admin/integration-tokens/{id}/rotate:
    post:
      tags: [admin-integration-tokens]
      summary: Rotate integration token (reissue secret, increment revision)
      operationId: adminTokenRotate
      security:
        - bearerAuth: [admin:tokens:write]
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Rotated (new secret shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationTokenCreateResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          description: Token revoked or invalid for rotate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'
  /api/v1/admin/integration-tokens/{id}/audit:
    get:
      tags: [admin-integration-tokens]
      summary: List append-only audit events for token usage and lifecycle
      operationId: adminTokenAuditList
      security:
        - bearerAuth: [admin:tokens:read]
      parameters:
        - $ref: '#/components/parameters/TokenId'
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIntegrationTokenAuditResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error5xx'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
  parameters:
    XIdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TokenId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error413:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error429:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error5xx:
      description: Transient server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    TenantBoundary:
      type: object
      additionalProperties: false
      required: [org_id]
      properties:
        org_id:
          type: string
          minLength: 1
        project_id:
          type: string
          minLength: 1
    Producer:
      type: object
      additionalProperties: false
      required: [name, version, build]
      properties:
        name: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }
        build: { type: string, minLength: 1 }
    GitlabContext:
      type: object
      additionalProperties: false
      properties:
        ci_pipeline_id: { type: string }
        ci_pipeline_iid: { type: string }
        ci_pipeline_url: { type: string, format: uri }
        ci_job_id: { type: string }
        ci_job_url: { type: string, format: uri }
        ci_job_name: { type: string }
        ci_job_stage: { type: string }
        ci_project_id: { type: string }
        ci_project_path: { type: string }
        ci_project_url: { type: string, format: uri }
        ci_commit_sha: { type: string }
        ci_commit_ref_name: { type: string }
        ci_commit_tag: { type: string }
        ci_commit_branch: { type: string }
    GitContext:
      type: object
      additionalProperties: false
      required: [repo_url, ref, sha]
      properties:
        repo_url: { type: string, format: uri }
        ref: { type: string }
        sha: { type: string, pattern: '^[a-fA-F0-9]{40}$' }
        message: { type: string }
        authored_at: { type: string, format: date-time }
        committed_at: { type: string, format: date-time }
    RunContext:
      type: object
      additionalProperties: false
      required: [pipeline_id, job_id, started_at]
      properties:
        pipeline_id: { type: string }
        pipeline_url: { type: string, format: uri }
        job_id: { type: string }
        job_url: { type: string, format: uri }
        job_name: { type: string }
        stage: { type: string }
        attempt: { type: integer, minimum: 1 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
    IngestMetadata:
      type: object
      additionalProperties: false
      required: [schema_version, producer, tenant, gitlab_context, git, run]
      properties:
        schema_version:
          type: string
          const: '1.0'
        producer:
          $ref: '#/components/schemas/Producer'
        tenant:
          $ref: '#/components/schemas/TenantBoundary'
        gitlab_context:
          $ref: '#/components/schemas/GitlabContext'
        git:
          $ref: '#/components/schemas/GitContext'
        run:
          $ref: '#/components/schemas/RunContext'
    IngestArtifact:
      type: object
      additionalProperties: false
      required: [path, size_bytes, sha256, media_type, format_hint]
      properties:
        path:
          type: string
          minLength: 1
        size_bytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
        media_type:
          type: string
          minLength: 1
        format_hint:
          type: string
          minLength: 1
        tool_name:
          type: string
        tool_version:
          type: string
    UploadPlanPart:
      type: object
      additionalProperties: false
      required: [part_number, url, min_size_bytes, max_size_bytes]
      properties:
        part_number: { type: integer, minimum: 1 }
        url: { type: string, format: uri }
        min_size_bytes: { type: integer, minimum: 1 }
        max_size_bytes: { type: integer, minimum: 1 }
    UploadPlanItem:
      type: object
      additionalProperties: false
      required: [artifact_path, object_key, upload_mode]
      properties:
        artifact_path: { type: string }
        object_key: { type: string }
        upload_mode:
          type: string
          enum: [presigned_put, multipart]
        put_url:
          type: string
          format: uri
        multipart:
          type: object
          additionalProperties: false
          required: [upload_id, complete_url, abort_url, parts]
          properties:
            upload_id: { type: string }
            complete_url: { type: string, format: uri }
            abort_url: { type: string, format: uri }
            parts:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/UploadPlanPart'
      allOf:
        - if:
            properties: { upload_mode: { const: presigned_put } }
          then:
            required: [put_url]
        - if:
            properties: { upload_mode: { const: multipart } }
          then:
            required: [multipart]
    IngestRunInitRequest:
      type: object
      additionalProperties: false
      required: [provider, metadata, artifacts]
      properties:
        provider:
          type: string
          const: gitlab
        metadata:
          $ref: '#/components/schemas/IngestMetadata'
        artifacts:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/IngestArtifact'
    IngestRunInitResponse:
      type: object
      additionalProperties: false
      required: [run_id, state, tenant, upload_plan, idempotency_key]
      properties:
        run_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [INITIATED, COMMITTED, FAILED]
        tenant:
          $ref: '#/components/schemas/TenantBoundary'
        idempotency_key:
          type: string
        upload_plan:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UploadPlanItem'
        created_at:
          type: string
          format: date-time
    IngestRunCommitRequest:
      type: object
      additionalProperties: false
      required: [artifacts]
      properties:
        artifacts:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [path, sha256, size_bytes, object_key]
            properties:
              path: { type: string }
              sha256: { type: string, pattern: '^[a-fA-F0-9]{64}$' }
              size_bytes: { type: integer, minimum: 1 }
              object_key: { type: string }
    IngestRunStatusResponse:
      type: object
      additionalProperties: false
      required: [run_id, state, tenant, artifacts]
      properties:
        run_id: { type: string, format: uuid }
        state:
          type: string
          enum: [INITIATED, VERIFYING, COMMITTED, FAILED]
        tenant:
          $ref: '#/components/schemas/TenantBoundary'
        artifacts:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [path, sha256, size_bytes, verified]
            properties:
              path: { type: string }
              sha256: { type: string }
              size_bytes: { type: integer }
              verified: { type: boolean }
        event_bus:
          type: object
          additionalProperties: false
          properties:
            emitted: { type: boolean }
            event_id: { type: string }
            emitted_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        committed_at: { type: string, format: date-time }
    TokenScope:
      type: string
      enum:
        - ingest:run:init
        - ingest:artifact:write
        - ingest:run:commit
        - admin:tokens:read
        - admin:tokens:write
    AdminIntegrationToken:
      type: object
      additionalProperties: false
      required: [id, name, revision, tenant, scopes, state, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        revision: { type: integer, minimum: 1 }
        tenant:
          $ref: '#/components/schemas/TenantBoundary'
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TokenScope'
        state:
          type: string
          enum: [ACTIVE, REVOKED, EXPIRED]
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
    AdminIntegrationTokenListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminIntegrationToken'
    AdminIntegrationTokenCreateRequest:
      type: object
      additionalProperties: false
      required: [name, tenant, scopes]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        tenant:
          $ref: '#/components/schemas/TenantBoundary'
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TokenScope'
        expires_at: { type: string, format: date-time }
    AdminIntegrationTokenCreateResponse:
      type: object
      additionalProperties: false
      required: [token, token_secret]
      properties:
        token:
          $ref: '#/components/schemas/AdminIntegrationToken'
        token_secret:
          type: string
          description: Plain token value shown once on issue/rotate.
        issued_at: { type: string, format: date-time }
    AdminIntegrationTokenPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        expires_at: { type: string, format: date-time }
    AdminIntegrationTokenAuditEvent:
      type: object
      additionalProperties: false
      required: [id, token_id, action, actor_type, occurred_at]
      properties:
        id: { type: string, format: uuid }
        token_id: { type: string, format: uuid }
        action:
          type: string
          enum: [ISSUED, USED, PATCHED, ROTATED, REVOKED, DENIED]
        actor_type:
          type: string
          enum: [USER, TOKEN, SYSTEM]
        actor_id: { type: string }
        request_id: { type: string }
        ip: { type: string }
        user_agent: { type: string }
        details:
          type: object
          additionalProperties: true
        occurred_at: { type: string, format: date-time }
    AdminIntegrationTokenAuditResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminIntegrationTokenAuditEvent'
        next_cursor:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              oneOf:
                - type: object
                  additionalProperties: true
                - type: array
                  items:
                    type: object
                    additionalProperties: true
