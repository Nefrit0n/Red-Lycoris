# Production overrides
# Использование:
#   ./scripts/build.sh
#   docker compose -f docker-compose.yml -f deployments/docker-compose.prod.yml up -d
#
# Отличия от dev:
#   - postgres/redis не выставляют порты наружу
#   - увеличены ресурсные лимиты
#   - frontend собирается из production-stage (nginx)
#   - нет bind-mount исходников

services:
  postgres:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G

  redis:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  backend:
    environment:
      ENV: production
      LOG_LEVEL: warn
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-3000}"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    volumes: !reset []
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    environment:
      VITE_API_URL: ""
