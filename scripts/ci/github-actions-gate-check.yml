name: Lotus Warden Gate Check
on:
  workflow_dispatch:
    inputs:
      import_job_id:
        description: "Import job ID to evaluate"
        required: true

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gate check
        env:
          LW_API_TOKEN: ${{ secrets.LOTUS_WARDEN_TOKEN }}
        run: |
          chmod +x scripts/gate-check.sh
          scripts/gate-check.sh "${{ secrets.LOTUS_WARDEN_URL }}" "${{ inputs.import_job_id }}"
