name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run linters
        run: ruff check --select F .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lotus_warden
          POSTGRES_USER: lotus
          POSTGRES_PASSWORD: lotus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lotus -d lotus_warden"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SECRET_KEY: "test-secret-key"
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_DB: "lotus_warden"
      POSTGRES_USER: "lotus"
      POSTGRES_PASSWORD: "lotus"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      CELERY_TASK_ALWAYS_EAGER: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python manage.py test --verbosity 2

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/lotus-warden:latest
            ghcr.io/${{ github.repository }}/lotus-warden:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.TEST_SSH_HOST != '' &&
      secrets.TEST_SSH_USER != '' &&
      secrets.TEST_SSH_KEY != ''
    environment: test
    steps:
      - name: Deploy to test environment
        uses: appleboy/ssh-action@v1.0.3
        env:
          DJANGO_SECRET_KEY: ${{ secrets.TEST_DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.TEST_DJANGO_ALLOWED_HOSTS }}
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.TEST_POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.TEST_POSTGRES_PORT }}
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT || 22 }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}/lotus-warden:latest
            docker stop lotus-warden || true
            docker rm lotus-warden || true
            docker run -d \
              --name lotus-warden \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DJANGO_SECRET_KEY="${DJANGO_SECRET_KEY}" \
              -e DJANGO_ALLOWED_HOSTS="${DJANGO_ALLOWED_HOSTS}" \
              -e POSTGRES_DB="${POSTGRES_DB}" \
              -e POSTGRES_USER="${POSTGRES_USER}" \
              -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
              -e POSTGRES_HOST="${POSTGRES_HOST}" \
              -e POSTGRES_PORT="${POSTGRES_PORT}" \
              ghcr.io/${{ github.repository }}/lotus-warden:latest
