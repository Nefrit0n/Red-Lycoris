name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  GOTOOLCHAIN: local

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      MIGRATIONS_PATH: migrations
      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            backend/go.sum

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker run --rm --network host postgres:16-alpine pg_isready -h localhost -U postgres >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready"
          docker ps -a || true
          exit 1

      - name: Go format & vet
        working-directory: backend
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Go files must be formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi
          go vet ./...

      - name: Run migrations
        working-directory: backend
        run: |
          set -euo pipefail
          go run ./cmd/migrate

      - name: Go tests
        working-directory: backend
        run: |
          set -euo pipefail
          go test -count=1 -race ./...

  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      MIGRATIONS_PATH: migrations

      NATS_URL: nats://localhost:4222

      OBJECT_STORE_ENDPOINT: localhost:9000
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_BUCKET: lotus-warden
      OBJECT_STORE_USE_SSL: "false"

      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret
      APP_PORT: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            backend/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install contract test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install schemathesis jsonschema

      - name: Start MinIO (daemon)
        run: |
          set -euo pipefail
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1 \
            server /data --address ":9000"
          docker ps | grep minio || (docker logs minio && exit 1)

      - name: Wait for services
        run: |
          set -euo pipefail

          echo "Waiting for Postgres..."
          for i in {1..30}; do
            if docker run --rm --network host postgres:16-alpine pg_isready -h localhost -U postgres >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Waiting for NATS..."
          for i in {1..30}; do
            if nc -z localhost 4222 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Waiting for MinIO..."
          for i in {1..60}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:9000/minio/health/live >/dev/null

      - name: Run migrations
        working-directory: backend
        run: |
          set -euo pipefail
          go run ./cmd/migrate

      - name: Start backend
        working-directory: backend
        run: |
          set -euo pipefail
          go run ./cmd/server > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Backend did not become healthy"
          echo "---- backend.log ----"
          cat /tmp/backend.log || true
          exit 1

      - name: Validate contract fixtures
        run: |
          set -euo pipefail
          python scripts/contracts/validate_fixtures.py

      - name: Run Schemathesis
        run: |
          set -euo pipefail
          scripts/contracts/run_schemathesis.sh

      - name: OpenAPI backward compatibility
        run: |
          set -euo pipefail
          go install github.com/oasdiff/oasdiff@v1.11.10
          scripts/contracts/check_openapi_compat.sh

      - name: Stop backend
        if: always()
        run: |
          set -euo pipefail
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

      - name: Stop MinIO
        if: always()
        run: |
          docker logs minio || true
          docker rm -f minio || true

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          if-no-files-found: ignore

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci

      - name: Lint
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run lint

      - name: Test
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run test

      - name: Build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run build

  python:
    name: Python API checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_api/requirements.txt

      - name: Install dependencies
        working-directory: python_api
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        working-directory: python_api
        run: |
          set -euo pipefail
          ruff check --output-format=github .
          ruff format --check --diff .

      - name: Run tests (allow no tests yet)
        working-directory: python_api
        run: |
          set -euo pipefail
          pytest --cov=app --cov-report=term-missing || rc=$?
          if [ "${rc:-0}" -eq 5 ]; then
            echo "pytest: no tests collected yet (exit 5) — not failing CI"
            exit 0
          fi
          exit "${rc:-0}"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend, python, contracts]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: backend/Dockerfile
            target: runtime
            tag: lotus-warden-backend
          - name: frontend
            context: ./frontend
            file: frontend/Dockerfile
            target: runtime
            tag: lotus-warden-frontend
          - name: nginx
            context: .
            file: nginx/Dockerfile
            target: ""
            tag: lotus-warden-nginx
          - name: python-api
            context: ./python_api
            file: python_api/Dockerfile
            target: runtime
            tag: lotus-warden-python-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: false
          tags: ${{ matrix.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, python, contracts]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: "lotus-warden/docs/template"

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          skip-dirs: "lotus-warden/docs/template"
