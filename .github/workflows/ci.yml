name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write      # создать tag и release
  packages: write      # запушить image в ghcr.io
  deployments: write   # создать deployment

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Автоматический bump тега по SemVer (v0.0.1 -> v0.0.2 -> ...)
  tag:
    name: 🏷️  Version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  # 2. Сборка Docker-образа и публикация в GHCR
  build:
    name: 🐳 Build & Push Image
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.tag.outputs.new_tag }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. GitHub Release с автоматически сгенерированным changelog
  release:
    name: 📦 Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: RedLycoris ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true

  # 4. Deployment в production environment
  deploy:
    name: 🌺 Deploy RedLycoris
    needs: [tag, build, release]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.tag.outputs.new_tag }}
    steps:
      - name: Deployment summary
        run: |
          {
            echo "## 🌺 RedLycoris ${{ needs.tag.outputs.new_tag }} deployed"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | \`${{ needs.tag.outputs.new_tag }}\` |"
            echo "| **Image**   | \`ghcr.io/${{ github.repository }}:${{ needs.tag.outputs.new_tag }}\` |"
            echo "| **Release** | [View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ needs.tag.outputs.new_tag }}) |"
            echo "| **Commit**  | \`${{ github.sha }}\` |"
          } >> $GITHUB_STEP_SUMMARY