name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write      # создать tag и release
  packages: write      # запушить images в ghcr.io
  deployments: write   # создать deployment

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Автоматический bump тега по SemVer (0.1.1 -> 0.1.2 -> ...)
  tag:
    name: 🏷️  Version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version and push tag
        id: tag
        run: |
          set -euo pipefail

          # Нормализуем все теги — убираем "v", сортируем как SemVer, берём максимальный
          LATEST=$(git tag -l \
                   | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
                   | sed 's/^v//' \
                   | sort -V \
                   | tail -n1 || true)
          LATEST=${LATEST:-0.0.0}
          echo "Latest tag (normalized): $LATEST"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          NEW_TAG="${MAJOR}.${MINOR}.${PATCH}"

          echo "New tag: $NEW_TAG"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  # 2. Параллельная сборка backend и frontend
  #    backend → ghcr.io/.../red-lycoris/backend:X.Y.Z
  #    frontend → ghcr.io/.../red-lycoris/frontend:X.Y.Z
  build:
    name: 🐳 Build & Push — ${{ matrix.service }}
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        id: ts
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.tag.outputs.new_tag }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Раздельный GHA-кэш для backend и frontend
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # Build args из docker-compose.yml (только backend их использует, frontend проигнорирует)
          build-args: |
            VERSION=${{ needs.tag.outputs.new_tag }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.ts.outputs.date }}

  # 3. GitHub Release с автоматически сгенерированным changelog
  #    Ждёт оба matrix-job'а из build
  release:
    name: 📦 Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: RedLycoris ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true

  # 4. Deployment в production environment
  deploy:
    name: 🌺 Deploy RedLycoris
    needs: [tag, build, release]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.tag.outputs.new_tag }}
    steps:
      - name: Deployment summary
        run: |
          {
            echo "## 🌺 RedLycoris ${{ needs.tag.outputs.new_tag }} deployed"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version**          | \`${{ needs.tag.outputs.new_tag }}\` |"
            echo "| **Backend image**    | \`ghcr.io/${{ github.repository }}/backend:${{ needs.tag.outputs.new_tag }}\` |"
            echo "| **Frontend image**   | \`ghcr.io/${{ github.repository }}/frontend:${{ needs.tag.outputs.new_tag }}\` |"
            echo "| **Release**          | [View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ needs.tag.outputs.new_tag }}) |"
            echo "| **Commit**           | \`${{ github.sha }}\` |"
          } >> $GITHUB_STEP_SUMMARY