name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    paths-ignore:
      - "lotus-warden/docs/template/**"
      - "docs/template/**"
  workflow_dispatch:
  schedule:
    # weekly security sweep (UTC)
    - cron: "20 2 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend checks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      MIGRATIONS_PATH: migrations
      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum # setup-go v6: можно привязать кеш к go.sum :contentReference[oaicite:5]{index=5}

      - name: Go format & vet
        working-directory: backend
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files must be formatted with gofmt"
            gofmt -l .
            exit 1
          fi
          go vet ./...

      - name: Run migrations
        working-directory: backend
        run: |
          set -euo pipefail
          go run ./cmd/migrate

      - name: Go tests
        working-directory: backend
        run: |
          set -euo pipefail
          go test ./...

  contracts:
    name: Contract tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      MIGRATIONS_PATH: migrations
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      NATS_URL: nats://localhost:4222
      OBJECT_STORE_ENDPOINT: localhost:9000
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_BUCKET: lotus-warden
      OBJECT_STORE_USE_SSL: false
      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret
      APP_PORT: 8080

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Start MinIO (workaround GHA services can't pass command args)
        run: |
          set -euo pipefail
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-01-18T22-51-28Z server /data --console-address ":9001"

      - name: Wait for MinIO
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become healthy"
          docker logs minio || true
          exit 1

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install contract test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install schemathesis jsonschema

      - name: Run migrations
        working-directory: backend
        run: |
          set -euo pipefail
          go run ./cmd/migrate

      - name: Build backend binary
        working-directory: backend
        run: |
          set -euo pipefail
          go build -o /tmp/backend ./cmd/server

      - name: Start backend
        run: |
          set -euo pipefail
          /tmp/backend > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          cat /tmp/backend.log || true
          exit 1

      - name: Validate contract fixtures
        run: |
          set -euo pipefail
          python scripts/contracts/validate_fixtures.py

      - name: Run Schemathesis
        run: |
          set -euo pipefail
          scripts/contracts/run_schemathesis.sh

      - name: OpenAPI backward compatibility
        run: |
          set -euo pipefail
          go install github.com/oasdiff/oasdiff@v1.11.7
          scripts/contracts/check_openapi_compat.sh

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "----- /tmp/backend.log -----"
          cat /tmp/backend.log || true

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi
          docker rm -f minio >/dev/null 2>&1 || true

  frontend:
    name: Frontend checks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci

      - name: Lint
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run lint

      - name: Test
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run test

  python:
    name: Python API checks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_api/requirements.txt

      - name: Install dependencies
        working-directory: python_api
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        working-directory: python_api
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .

      - name: Run tests
        working-directory: python_api
        run: |
          set -euo pipefail
          pytest --cov=app --cov-report=term-missing

  docker:
    name: Docker build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend, python]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: false
          tags: lotus-warden-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Build python-api image
        uses: docker/build-push-action@v6
        with:
          context: ./python_api
          file: python_api/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-python-api:${{ github.sha }}
          cache-from: type=gha,scope=python_api
          cache-to: type=gha,mode=max,scope=python_api

  # ---------------- Security ----------------

  security-codeql:
    name: SAST (CodeQL) - public only
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [go, python, javascript-typescript]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config: |
            queries:
              - uses: security-extended
            paths-ignore:
              - "lotus-warden/docs/template/**"
              - "docs/template/**"

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  security-lite:
    name: SAST lite (private fallback)
    if: ${{ github.event.repository.private == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: gosec (Go SAST)
        working-directory: backend
        run: |
          set -euo pipefail
          # Install gosec CLI and ensure GOPATH/bin is on PATH
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          # Run gosec on the backend module
          gosec ./...

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_api/requirements.txt

      - name: bandit (Python SAST)
        working-directory: python_api
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit
          bandit -r .

  security-secrets:
    name: Secrets scan (Gitleaks + TruffleHog3)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create gitleaks config (ignore docs templates)
        run: |
          set -euo pipefail
          cat > /tmp/gitleaks.toml <<'TOML'
          title = "Lotus-Warden CI gitleaks config"

          [extend]
          useDefault = true

          [[allowlists]]
          description = "Ignore docs templates directory"
          paths = [
            '''^lotus-warden/docs/template/''',
            '''^docs/template/'''
          ]
          TOML

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: /tmp/gitleaks.toml

      - name: Set up Python (for trufflehog3)
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install trufflehog3
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "trufflehog3==3.0.10"

      - name: Run trufflehog3
        run: |
          set -euo pipefail
          trufflehog3 \
            --config .trufflehog3.yml \
            -f JSON \
            -o trufflehog3.json \
            -s HIGH \
            .

      - name: Upload trufflehog3 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog3-report
          path: trufflehog3.json

  security-trivy-ci:
    name: Trivy scan (fs + config) - CI
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, python]

    steps:
      - uses: actions/checkout@v5

      - name: Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: "lotus-warden/docs/template,docs/template"

      - name: Trivy config scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          skip-dirs: "lotus-warden/docs/template,docs/template"

  security-trivy-scheduled:
    name: Trivy scan (fs + config) - scheduled
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: "lotus-warden/docs/template,docs/template"

      - name: Trivy config scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          skip-dirs: "lotus-warden/docs/template,docs/template"

  dependency-review:
    name: Dependency Review (PR only, public only)
    if: ${{ github.event_name == 'pull_request' && github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # action docs/examples упоминают доп. права для PR feedback :contentReference[oaicite:6]{index=6}

    steps:
      - uses: actions/checkout@v5
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
