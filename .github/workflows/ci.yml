name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      MIGRATIONS_PATH: migrations 
      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret
      
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go format & vet
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files must be formatted with gofmt"
            exit 1
          fi
          go vet ./...

      - name: Run migrations
        working-directory: backend
        run: go run ./cmd/migrate

      - name: Go tests
        working-directory: backend
        run: go test ./...

  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
      minio:
        image: minio/minio:RELEASE.2024-01-18T22-51-28Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      command: server /data --console-address ":9001"
        
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      MIGRATIONS_PATH: migrations 
      DB_NAME: lotus_warden
      DB_SSLMODE: disable
      NATS_URL: nats://localhost:4222
      OBJECT_STORE_ENDPOINT: localhost:9000
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_BUCKET: lotus-warden
      OBJECT_STORE_USE_SSL: false
      ROOT_EMAIL: root@localhost
      ROOT_PASSWORD: root
      JWT_SECRET: contract-test-secret
      APP_PORT: 8080

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install contract test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install schemathesis jsonschema

      - name: Run migrations
        working-directory: backend
        run: go run ./cmd/migrate

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              break
            fi
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        run: |
          go run ./cmd/server > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend did not become healthy"
          cat /tmp/backend.log
          exit 1

      - name: Validate contract fixtures
        run: python scripts/contracts/validate_fixtures.py

      - name: Run Schemathesis
        run: scripts/contracts/run_schemathesis.sh

      - name: OpenAPI backward compatibility
        run: |
          go install github.com/tufin/oasdiff/cmd/oasdiff@latest
          scripts/contracts/check_openapi_compat.sh

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

  python:
    name: Python API checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_api/requirements.txt

      - name: Install dependencies
        working-directory: python_api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        working-directory: python_api
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        working-directory: python_api
        run: pytest --cov=app --cov-report=term-missing || true

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend, python]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: false
          tags: lotus-warden-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build python-api image
        uses: docker/build-push-action@v6
        with:
          context: ./python_api
          file: python_api/Dockerfile
          target: runtime
          push: false
          tags: lotus-warden-python-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, python]

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
