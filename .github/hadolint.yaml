# Hadolint configuration for Red Lycoris Dockerfiles.

# Минимальный порог, на котором падать. info-уровень показывается, но не валит билд.
failure-threshold: warning

# Доверенные registry — отсюда можно тянуть образы без явного pin к digest.
trustedRegistries:
  - ghcr.io
  - docker.io

# Отключаем правила, которые либо неприменимы, либо слишком душные.
ignored:
  # DL3008 — pinning apt-get versions. Хорошее правило, но в multi-stage builds,
  # где базовый образ обновляется регулярно, pin'ы быстро устаревают и блокируют
  # security updates. Если хочется строго — убери эту строку и закрывай каждый
  # пин руками.
  - DL3008

# Если в Dockerfile используется shell-логика — hadolint парсит её через shellcheck.
# Конфиг shellcheck-а тоже здесь.
override:
  error: []
  warning: []
  info: []
  style: []
