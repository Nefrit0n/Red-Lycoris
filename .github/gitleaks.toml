# Gitleaks configuration for Red Lycoris.
#
# Расширяет дефолтный набор правил gitleaks. Добавляет allowlists для
# синтетических креденшелов в тестовых фикстурах и seed-скриптах.

[extend]
useDefault = true

# ─────────────────────────────────────────────────────────────────────
# Allowlists — что разрешаем gitleaks игнорировать.
# Всё, что попадает сюда, должно быть ОЧЕВИДНО синтетикой.
# Реальные секреты НИКОГДА не должны попадать в allowlist.
# ─────────────────────────────────────────────────────────────────────

[[allowlists]]
description = "Синтетические данные в seed-скриптах для разработки"
paths = [
  '''(^|/)scripts/.*seeder.*\.(py|go|sql)$''',
  '''(^|/)scripts/seed/.*''',
]

[[allowlists]]
description = "Тестовые фикстуры парсеров (отчёты сканеров с фейковыми токенами)"
paths = [
  '''(^|/)backend/internal/parser/testdata/.*''',
  '''(^|/)backend/.*/testdata/.*''',
]

[[allowlists]]
description = "Файлы с примерами конфигурации"
paths = [
  '''^env\.example$''',
  '''(^|/)\.env\.example$''',
  '''(^|/)docs/.*\.md$''',
  '''^README\.md$''',
  '''^CHANGELOG\.md$''',
  '''^CLAUDE\.md$''',
]

[[allowlists]]
description = "Хорошо известные синтетические образцы из документации AWS/GitHub"
regexes = [
  # AWS-канон для документации
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  # GitHub PAT-подобные паттерны явно с пометкой example
  '''ghp_[A-Za-z0-9]{36}EXAMPLE''',
  # JWT с alg=none и пустым payload — встречается в документации
  '''eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0\.\.''',
]

# ─────────────────────────────────────────────────────────────────────
# Inline-разметка через комментарии тоже работает:
#
#   const fakeToken = "ghp_..."  // gitleaks:allow
#
# Используй её как fallback для разовых случаев, чтобы не плодить пути
# в этом конфиге.
# ─────────────────────────────────────────────────────────────────────
