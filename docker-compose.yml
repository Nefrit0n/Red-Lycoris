services:
  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:${NGINX_PORT:-8081}}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      - python-api

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      - APP_PORT=${BACKEND_PORT:-8080}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-lotus_warden}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MIGRATIONS_PATH=/app/migrations
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  python-api:
    build:
      context: ./python_api
    environment:
      - PYTHON_API_PORT=${PYTHON_API_PORT:-8000}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-uvicorn.workers.UvicornWorker}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./python_api
    command: >
      celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      - redis

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-8081}:80"
    depends_on:
      - backend
      - python-api

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-lotus_warden}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB} -c work_mem=${POSTGRES_WORK_MEM:-4MB}

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
