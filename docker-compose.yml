# docker-compose.yml - Production configuration
# For development, use: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# Or simply: docker compose up (override is applied automatically if present)

# Common environment variables using YAML anchors
x-db-env: &db-env
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-red_lycoris}
  DB_SSLMODE: ${DB_SSLMODE:-disable}

x-object-store-env: &object-store-env
  OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-minio:9000}
  OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
  OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
  OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-red-lycoris}
  OBJECT_STORE_USE_SSL: ${OBJECT_STORE_USE_SSL:-false}

x-analysis-env: &analysis-env
  ANALYSIS_MAX_ARCHIVE_BYTES: ${ANALYSIS_MAX_ARCHIVE_BYTES:-104857600}
  ANALYSIS_MAX_EXTRACT_BYTES: ${ANALYSIS_MAX_EXTRACT_BYTES:-524288000}
  ANALYSIS_TEMP_DIR: ${ANALYSIS_TEMP_DIR:-/tmp/red-lycoris-analysis}
  ANALYSIS_SCANNER_TIMEOUT: ${ANALYSIS_SCANNER_TIMEOUT:-20m}
  ANALYSIS_CLEANUP_INTERVAL: ${ANALYSIS_CLEANUP_INTERVAL:-1h}
  ANALYSIS_CLEANUP_TTL: ${ANALYSIS_CLEANUP_TTL:-24h}
  ANALYSIS_SEMGREP_IMAGE: ${ANALYSIS_SEMGREP_IMAGE:-semgrep/semgrep:1.102.0}
  ANALYSIS_TRIVY_IMAGE: ${ANALYSIS_TRIVY_IMAGE:-aquasec/trivy:0.58.1}
  ANALYSIS_OPENGREP_BINARY: ${ANALYSIS_OPENGREP_BINARY:-/usr/local/bin/opengrep}
  ANALYSIS_CHECKOV_IMAGE: ${ANALYSIS_CHECKOV_IMAGE:-bridgecrew/checkov:latest}
  ANALYSIS_KICS_IMAGE: ${ANALYSIS_KICS_IMAGE:-checkmarx/kics:latest}
  ANALYSIS_GITLEAKS_IMAGE: ${ANALYSIS_GITLEAKS_IMAGE:-zricethezav/gitleaks:latest}
  ANALYSIS_GRYPE_IMAGE: ${ANALYSIS_GRYPE_IMAGE:-anchore/grype:latest}
  ANALYSIS_CONTAINER_NETWORK: ${ANALYSIS_CONTAINER_NETWORK:-bridge}

x-intel-env: &intel-env
  NVD_API_KEY: ${NVD_API_KEY:-}
  EPSS_ENABLED: ${EPSS_ENABLED:-true}
  KEV_URL: ${KEV_URL:-}
  KEV_MIRROR_URL: ${KEV_MIRROR_URL:-}
  INTEL_REFRESH_INTERVAL: ${INTEL_REFRESH_INTERVAL:-24h}
  INTEL_WORKER_CONCURRENCY: ${INTEL_WORKER_CONCURRENCY:-4}
  INTEL_RETRY_BASE: ${INTEL_RETRY_BASE:-30m}

x-celery-env: &celery-env
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

services:
  # ------------------------------------------------------------
  # Edge / Gateway
  # ------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:8080" # HTTP -> redirect to HTTPS
      - "443:8443" # HTTPS
    volumes:
      - nginx_ssl:/etc/nginx/ssl
    environment:
      SSL_DOMAIN: ${SSL_DOMAIN:-localhost}
      TLS_SAN: ${TLS_SAN:-DNS:localhost,IP:127.0.0.1}
    depends_on:
      backend:
        condition: service_healthy
      python-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/nginx-health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-net

  # ------------------------------------------------------------
  # One-shot init: DB migrations + root user
  # ------------------------------------------------------------
  db-migrate:
    build:
      context: ./backend
      target: dev
    # требуется добавить cmd/migrate (go run ./cmd/migrate)
    command: [ "go", "run", "./cmd/migrate" ]
    environment:
      <<: [ *db-env, *object-store-env, *analysis-env, *intel-env ]
      APP_ENV: production
      MIGRATIONS_PATH: /app/migrations

      # root bootstrap (иначе warning и insecure дефолт)
      ROOT_EMAIL: ${ROOT_EMAIL:-root@localhost}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-root}

      # чтобы jwt не генерился на лету
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - app-net

  # ------------------------------------------------------------
  # One-shot init: NATS JetStream streams
  # ------------------------------------------------------------
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    command: >
      sh -lc '
        nats --server nats://nats:4222 stream add ANALYSIS --subjects "analysis.>" --storage file --retention limits --max-age 168h --defaults || true;
        nats --server nats://nats:4222 stream add INTEL   --subjects "intel.>"   --storage file --retention limits --max-age 168h --defaults || true;
        nats --server nats://nats:4222 stream add SBOM    --subjects "sbom.>"    --storage file --retention limits --max-age 168h --defaults || true;
      '
    restart: "no"
    networks:
      - app-net

  # ------------------------------------------------------------
  # Backend API
  # ------------------------------------------------------------
  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      <<: [ *db-env, *object-store-env, *analysis-env, *intel-env ]
      APP_ENV: production
      APP_PORT: 8080
      LW_DEBUG_ERRORS: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NATS_URL: ${NATS_URL:-nats://nats:4222}

      # ВАЖНО: backend больше не гоняет миграции
      # MIGRATIONS_PATH: /app/migrations   <-- УБРАЛИ

      JWT_SECRET: ${JWT_SECRET}
      ROOT_EMAIL: ${ROOT_EMAIL:-root@localhost}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-root}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-net

  # ------------------------------------------------------------
  # Analysis worker
  # ------------------------------------------------------------
  analysis-worker:
    build:
      context: ./backend
      target: analysis-worker
    environment:
      <<: [ *db-env, *object-store-env, *analysis-env, *intel-env ]
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      JWT_SECRET: ${JWT_SECRET}
      ROOT_EMAIL: ${ROOT_EMAIL:-root@localhost}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-root}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Run as root for Docker socket access
    user: "0:0"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  # ------------------------------------------------------------
  # Intel worker
  # ------------------------------------------------------------
  intel-worker:
    build:
      context: ./backend
      target: intel-worker
    environment:
      <<: [ *db-env, *intel-env ]
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      JWT_SECRET: ${JWT_SECRET}
      ROOT_EMAIL: ${ROOT_EMAIL:-root@localhost}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-root}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  # ------------------------------------------------------------
  # Python API
  # ------------------------------------------------------------
  python-api:
    build:
      context: ./python_api
    environment:
      <<: *celery-env
      APP_ENV: production
      PYTHON_API_PORT: 8000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_WORKER_CLASS: ${GUNICORN_WORKER_CLASS:-uvicorn.workers.UvicornWorker}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-net

  celery-worker:
    build:
      context: ./python_api
    command: >
      celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      <<: *celery-env
      APP_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  # ------------------------------------------------------------
  # Infra
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-red_lycoris}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB} -c work_mem=${POSTGRES_WORK_MEM:-4MB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-red_lycoris}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-net

  nats:
    image: nats:2.10-alpine
    command: [ "-js", "-m", "8222" ]
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  nginx_ssl:
