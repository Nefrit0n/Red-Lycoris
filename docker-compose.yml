services:
  backend:
    build:
      context: ./backend
      target: dev
    environment:
      - APP_PORT=${BACKEND_PORT:-8080}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-lotus_warden}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - OBJECT_STORE_ENDPOINT=${OBJECT_STORE_ENDPOINT:-minio:9000}
      - OBJECT_STORE_ACCESS_KEY=${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      - OBJECT_STORE_SECRET_KEY=${OBJECT_STORE_SECRET_KEY:-minioadmin}
      - OBJECT_STORE_BUCKET=${OBJECT_STORE_BUCKET:-lotus-warden}
      - OBJECT_STORE_USE_SSL=${OBJECT_STORE_USE_SSL:-false}
      - ANALYSIS_MAX_ARCHIVE_BYTES=${ANALYSIS_MAX_ARCHIVE_BYTES:-104857600}
      - ANALYSIS_MAX_EXTRACT_BYTES=${ANALYSIS_MAX_EXTRACT_BYTES:-524288000}
      - ANALYSIS_TEMP_DIR=${ANALYSIS_TEMP_DIR:-/tmp/lotus-warden-analysis}
      - ANALYSIS_SCANNER_TIMEOUT=${ANALYSIS_SCANNER_TIMEOUT:-20m}
      - ANALYSIS_CLEANUP_INTERVAL=${ANALYSIS_CLEANUP_INTERVAL:-1h}
      - ANALYSIS_CLEANUP_TTL=${ANALYSIS_CLEANUP_TTL:-24h}
      - ANALYSIS_SEMGREP_IMAGE=${ANALYSIS_SEMGREP_IMAGE:-semgrep/semgrep:latest}
      - ANALYSIS_TRIVY_IMAGE=${ANALYSIS_TRIVY_IMAGE:-aquasec/trivy:latest}
      - ANALYSIS_CONTAINER_NETWORK=${ANALYSIS_CONTAINER_NETWORK:-none}
      - MIGRATIONS_PATH=/app/migrations
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - nats
      - minio

  analysis-worker:
    build:
      context: ./backend
      target: dev
    command: ["go", "run", "./cmd/analysis_worker"]
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-lotus_warden}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - OBJECT_STORE_ENDPOINT=${OBJECT_STORE_ENDPOINT:-minio:9000}
      - OBJECT_STORE_ACCESS_KEY=${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      - OBJECT_STORE_SECRET_KEY=${OBJECT_STORE_SECRET_KEY:-minioadmin}
      - OBJECT_STORE_BUCKET=${OBJECT_STORE_BUCKET:-lotus-warden}
      - OBJECT_STORE_USE_SSL=${OBJECT_STORE_USE_SSL:-false}
      - ANALYSIS_MAX_ARCHIVE_BYTES=${ANALYSIS_MAX_ARCHIVE_BYTES:-104857600}
      - ANALYSIS_MAX_EXTRACT_BYTES=${ANALYSIS_MAX_EXTRACT_BYTES:-524288000}
      - ANALYSIS_TEMP_DIR=${ANALYSIS_TEMP_DIR:-/tmp/lotus-warden-analysis}
      - ANALYSIS_SCANNER_TIMEOUT=${ANALYSIS_SCANNER_TIMEOUT:-20m}
      - ANALYSIS_CLEANUP_INTERVAL=${ANALYSIS_CLEANUP_INTERVAL:-1h}
      - ANALYSIS_CLEANUP_TTL=${ANALYSIS_CLEANUP_TTL:-24h}
      - ANALYSIS_SEMGREP_IMAGE=${ANALYSIS_SEMGREP_IMAGE:-semgrep/semgrep:latest}
      - ANALYSIS_TRIVY_IMAGE=${ANALYSIS_TRIVY_IMAGE:-aquasec/trivy:latest}
      - ANALYSIS_CONTAINER_NETWORK=${ANALYSIS_CONTAINER_NETWORK:-none}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - nats
      - minio

  python-api:
    build:
      context: ./python_api
    environment:
      - PYTHON_API_PORT=${PYTHON_API_PORT:-8000}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-uvicorn.workers.UvicornWorker}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./python_api
    command: >
      celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      - redis

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-8081}:80"
    depends_on:
      - backend
      - python-api

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-lotus_warden}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB} -c work_mem=${POSTGRES_WORK_MEM:-4MB}

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "${NATS_PORT:-4222}:4222"

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${OBJECT_STORE_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
