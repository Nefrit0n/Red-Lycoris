# Common environment variables using YAML anchors
x-db-env: &db-env
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-lotus_warden}
  DB_SSLMODE: ${DB_SSLMODE:-disable}

x-object-store-env: &object-store-env
  OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-minio:9000}
  OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
  OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
  OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-lotus-warden}
  OBJECT_STORE_USE_SSL: ${OBJECT_STORE_USE_SSL:-false}

x-analysis-env: &analysis-env
  ANALYSIS_MAX_ARCHIVE_BYTES: ${ANALYSIS_MAX_ARCHIVE_BYTES:-104857600}
  ANALYSIS_MAX_EXTRACT_BYTES: ${ANALYSIS_MAX_EXTRACT_BYTES:-524288000}
  ANALYSIS_TEMP_DIR: ${ANALYSIS_TEMP_DIR:-/tmp/lotus-warden-analysis}
  ANALYSIS_SCANNER_TIMEOUT: ${ANALYSIS_SCANNER_TIMEOUT:-20m}
  ANALYSIS_CLEANUP_INTERVAL: ${ANALYSIS_CLEANUP_INTERVAL:-1h}
  ANALYSIS_CLEANUP_TTL: ${ANALYSIS_CLEANUP_TTL:-24h}
  ANALYSIS_SEMGREP_IMAGE: ${ANALYSIS_SEMGREP_IMAGE:-semgrep/semgrep:1.102.0}
  ANALYSIS_TRIVY_IMAGE: ${ANALYSIS_TRIVY_IMAGE:-aquasec/trivy:0.58.1}
  ANALYSIS_CONTAINER_NETWORK: ${ANALYSIS_CONTAINER_NETWORK:-none}

x-celery-env: &celery-env
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

services:
  backend:
    build:
      context: ./backend
      target: dev
    environment:
      <<: [ *db-env, *object-store-env, *analysis-env ]
      APP_PORT: ${BACKEND_PORT:-8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      MIGRATIONS_PATH: /app/migrations
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  analysis-worker:
    build:
      context: ./backend
      target: dev
    command: [ "go", "run", "./cmd/analysis_worker" ]
    environment:
      <<: [ *db-env, *object-store-env, *analysis-env ]
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  python-api:
    build:
      context: ./python_api
    environment:
      <<: *celery-env
      PYTHON_API_PORT: ${PYTHON_API_PORT:-8000}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_WORKER_CLASS: ${GUNICORN_WORKER_CLASS:-uvicorn.workers.UvicornWorker}
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  celery-worker:
    build:
      context: ./python_api
    command: >
      celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      <<: *celery-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
      python-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lotus_warden}
    # Port exposed only for development - remove in production
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB} -c work_mem=${POSTGRES_WORK_MEM:-4MB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lotus_warden}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    # Port exposed only for development - remove in production
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  nats:
    image: nats:2.10-alpine
    command: [ "-js" ]
    # Port exposed only for development - remove in production
    ports:
      - "${NATS_PORT:-4222}:4222"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    command: [ "server", "/data", "--console-address", ":9001" ]
    # Ports exposed only for development - remove in production
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
