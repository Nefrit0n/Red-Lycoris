# docker-compose.override.yml - Development overrides
# This file is automatically applied when running `docker compose up`
# For production only, use: docker compose -f docker-compose.yml up

services:
  nginx:
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      target: dev
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development

  analysis-worker:
    build:
      context: ./backend
      target: dev
    command: [ "go", "run", "./cmd/analysis_worker" ]
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock

  intel-worker:
    build:
      context: ./backend
      target: dev
    command: [ "go", "run", "./cmd/intel_worker" ]
    volumes:
      - ./backend:/app

  python-api:
    volumes:
      - ./python_api:/app
    environment:
      APP_ENV: development

  celery-worker:
    volumes:
      - ./python_api:/app
    environment:
      APP_ENV: development
