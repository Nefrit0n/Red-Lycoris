# .trufflehog3.yml

exclude:
  - message: Build artifacts
    paths:
      - "build/**"
      - "dist/**"
      - "coverage/**"
      - "**/*.min.js"
      - "**/*.min.css"
      - "backend/go.sum"
      - "frontend/package-lock.json"

  - message: Docs templates and examples
    paths:
      - "red_lycoris/docs/template/**"
      - "docs/template/**"
      - "docs/**/*.html"
      - "docs/examples/**"
      - "docs/guides/**"

  - message: Fake credentials used in tests
    pattern: "AKIA[A-Z0-9]{16}"
    paths:
      - "**/*_test.go"
      - "**/test/**"
      - "**/tests/**"

  - message: Example AWS key used in tests
    pattern: "AKIAIOSFODNN7EXAMPLE"

ignore_nosecret: true
no_entropy: false
no_pattern: false

branch: "main"
depth: 10000
since: null
no_current: false
no_history: true

context: 0
