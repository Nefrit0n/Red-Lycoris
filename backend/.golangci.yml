# golangci-lint configuration for Red Lycoris.
# Compatible with golangci-lint v2.x.

version: "2"

run:
  timeout: 10m
  go: "1.24"
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true
      print-linter-name: true
      print-issued-lines: true

linters:
  # v2 replacement for old "disable-all: true".
  default: none

  enable:
    # Базовые и самые полезные проверки
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # Security / backend-specific
    - gosec
    - rowserrcheck
    - sqlclosecheck
    - bodyclose

    # Ошибки, context, nil-scenarios
    - errorlint
    - nilerr
    - nilnil
    - contextcheck
    - copyloopvar

    # Качество и поддерживаемость
    - gocritic
    - revive
    - misspell
    - unconvert

  settings:
    gosec:
      # G104 дублирует errcheck, поэтому оставляем обработку ошибок на errcheck.
      excludes:
        - G104
      severity: medium
      confidence: medium

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # Много шума и вкусовщины для обычного backend-кода.
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
        - whyNoLint
        - unnamedResult
        - httpNoBody
        - singleCaseSwitch
        - ifElseChain
        - stringConcatSimplify
        - exitAfterDefer

    govet:
      enable-all: true
      disable:
        # Часто ломает читаемость структур ради микровыигрыша по памяти.
        - fieldalignment
        # Много шума от переменных цикла и err в разных ветках.
        - shadow

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          severity: warning
          disabled: true
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

        # Слишком душно для проекта: не требуем package comments.
        - name: package-comments
          disabled: true

        # В handlers/interface impl часто есть legitimate unused params.
        - name: unused-parameter
          disabled: true

    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.DB).Close
        - (*github.com/jackc/pgx/v5/pgxpool.Pool).Close
        - fmt.Fprintf(os.Stderr)
        - fmt.Fprintln(os.Stderr)
        - (github.com/jackc/pgx/v5.Tx).Rollback
        - (*github.com/redis/go-redis/v9.Client).Close

    misspell:
      locale: US

    rowserrcheck:
      packages:
        - github.com/jackc/pgx/v5
        - github.com/jackc/pgx/v5/pgxpool

  exclusions:
    generated: lax

    rules:
      # В тестах меньше требований, особенно к security и вкусовым правилам.
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
          - revive
          - bodyclose
          - rowserrcheck
          - sqlclosecheck

      # Сгенерированный код мы не контролируем.
      - path: \.gen\.go$
        linters:
          - gocritic
          - gosec
          - revive
          - staticcheck

      # Миграции — отдельный мир.
      - path: migrations/
        linters:
          - gosec
          - gocritic
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
